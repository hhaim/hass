transforms:
  normalize_appdaemon:
    type: remap
    inputs:
      - docker_logs
    source: |
      if .container_name != "appdaemon" { abort }

      parsed, err = parse_regex(.message, r'^(?P<timestamp>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}\.\d+) (?P<level>\w+) (?P<app>[^:]+):\s*(?P<message>.*)$')
      if err == null {
        .body = parsed
      } else {
        .body = .message
      }

      .service_name = "appdaemon"
      .stream       = .stream

      del(.labels)
      del(.message)
      del(.source_type)
      del(.container_id)
      del(.host)
      del(.container_name)