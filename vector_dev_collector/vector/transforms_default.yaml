transforms:
  normalize_default:
    type: remap
    inputs:
      - docker_logs
    source: |
      container = string!(.container_name)
      if !( container == "homeassistant" || container == "appdaemon" || starts_with(container, "dnscrypt") ) { abort }
    
      parsed, err = parse_json(.message)
      if err == null {
        .body = parsed
      } else {
        .body = .message
      }

      .service_name = get(value: .labels, path: ["service.name"]) ?? .container_name
      .stream       = .stream

      del(.labels)
      del(.message)
      del(.source_type)
      del(.container_id)
      del(.host)
      del(.container_name)