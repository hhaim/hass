global:
  scrape_interval: 2m

scrape_configs:
    - job_name: ping_exporter
      metrics_path: /metrics
      scheme: http
      static_configs:
        - targets: ['10.0.0.140:9427']

    - job_name: cadvisor
      metrics_path: /metrics
      scheme: http
      static_configs:
        - targets: ['10.0.0.140:8091']
      metric_relabel_configs:
        # Extract full container ID from cgroup path
        - source_labels: [id]
          regex: '.*/docker-([0-9a-f]{64})\.scope'
          target_label: container_id
          replacement: '${1}'
        
        # Extract short container ID (first 12 chars)
        - source_labels: [id]
          regex: '.*/docker-([0-9a-f]{12}).*'
          target_label: container_id_short
          replacement: '${1}'

    - job_name: frigate_host
      metrics_path: /metrics
      scheme: http
      static_configs:
        - targets: ['10.0.0.57:9100']

    - job_name: frigate_nvidia
      metrics_path: /metrics
      scheme: http
      static_configs:
        - targets: ['10.0.0.57:9835']

    - job_name: hass_host
      metrics_path: /metrics
      scheme: http
      static_configs:
        - targets: ['10.0.0.140:9100']
