
group: 
  base_light:
    name: basement lights
    entities:
      - switch.base_power_light_l1
      - switch.base_power_light_l2
      - switch.base_power_light_l3
      - switch.base_power_light_l4
      - switch.base_fan_power

input_boolean:
  base_all:
    name: base_enable_all
  base_ac_input:   
    name: A/C-Base


mqtt:
   sensor:
    - name: "bt1_action"
      state_topic: "zigbee2mqtt/bt1/action"
      expire_after: 1

    - name: "base_button_enter_action"
      state_topic: "zigbee2mqtt_base/base_button_enter/action"
      expire_after: 1
 