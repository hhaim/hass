# Example: Humidity-based switch control with hysteresis
# Automatically controls a switch (dehumidifier, fan, etc.) based on humidity sensor readings
# Features: hysteresis control, max runtime protection, cooldown period, schedule integration, Sabbath support
#bathroom_dehumidifier:
#  module: heat_app
#  class: HumiditySwitchApp
#  schedule:
#    # Disable during these times (e.g., night hours when noise is undesirable)
#    - { mode: a, start: { t: "22:00:00", d: 0}, end: { t: "06:00:00", d: 0} }
#  
#  humidity_switch:
#    switch: switch.bathroom_dehumidifier        # Switch to control
#    sensor: sensor.bathroom_humidity            # Humidity sensor to monitor
#    input_start: 65.0                           # Start when humidity > 65% (trigger threshold)
#    input_stop: 60.0                            # Stop when humidity <= 60% (release threshold)
#    max_time_minutes: 120                       # Maximum 2 hours continuous runtime
#    cooldown_minutes: 180                       # Cooldown period after max runtime (3 hours)
#    enable: input_boolean.dehumidifier_enable   # Enable switch (read-only at schedule start)
#    
#    # Optional parameters (with defaults)
#    sensor_max_age_minutes: 10                  # Optional: sensor staleness check (default: 10 min)
#    notify_service: notify/telegram             # Optional: notification service for max runtime alerts
#
# Hysteresis explanation:
#   - input_start (65%) > input_stop (60%) creates a 5% dead zone
#   - When humidity rises above 65%: switch turns ON
#   - When humidity drops below 60%: switch turns OFF
#   - When humidity is between 60-65%: switch maintains current state (prevents rapid cycling)
#
# Max runtime protection:
#   - If switch runs continuously for max_time_minutes, it will stop and enter cooldown
#   - Cooldown period prevents immediate restart (gives device a break)
#   - Notification is sent if notify_service is configured
#   - Useful for detecting device malfunction or insufficient capacity
#
# States:
#   - DISABLED: Schedule active or Sabbath active, switch OFF, no monitoring
#   - MONITORING: Listening to sensor changes, ready to start switch if needed
#   - RUNNING: Switch ON, monitoring humidity to decide when to stop
#   - COOLDOWN: Switch OFF after max runtime, waiting before resuming monitoring

